<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gal&Rotem's Wedding Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #1B3022;
            --accent: #C5A059;
            --bg: #fdfbf7;
            --glass: rgba(255, 255, 255, 0.98);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#e5e1da 0.8px, transparent 0.8px);
            background-size: 40px 40px;
            color: var(--primary);
            margin: 0;
            display: flex;
            justify-content: center; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass);
            width: 92%; max-width: 420px;
            padding: 50px 30px;
            border-radius: 35px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .screen { animation: screenFadeIn 0.5s ease-out forwards; }
        @keyframes screenFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }

        /* עיצוב הלוגו החדש כתמונה */
        .game-logo { margin-bottom: 20px; }
        .couple-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20%;
            border: 1px solid var(--primary);
            padding: 3px;
        }

        h1 { font-weight: 700; font-size: 2.2rem; margin: 10px 0 30px; letter-spacing: -1.5px; }

        input {
            width: 100%; padding: 18px; border: 1px solid #e0e0e0;
            border-radius: 20px; margin-bottom: 20px;
            font-size: 18px; box-sizing: border-box; outline: none;
            background: #fafafa;
        }

        button {
            width: 100%; padding: 19px; border: none;
            border-radius: 20px; font-size: 18px; font-weight: 600;
            cursor: pointer; transition: 0.3s ease;
            margin-bottom: 12px; font-family: inherit;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); }

        .progress-bar { height: 4px; background: #f0f0f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }
        .q-img-wrapper { width: 100%; height: 210px; border-radius: 24px; overflow: hidden; margin-bottom: 25px; background: #eee; }
        .q-img { width: 100%; height: 100%; object-fit: cover; }

        .match-label { font-size: 1.2rem; color: #666; margin-bottom: 5px; }
        .match-name { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -2px; }
        .match-percent { font-size: 5rem; font-weight: 800; color: var(--accent); margin: 10px 0; display: block; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .score-box { display: flex; gap: 15px; margin-top: 25px; }
        .score-col { flex: 1; padding: 20px 10px; background: #f9faf9; border-radius: 24px; border: 1px solid #f0f2f0; }
        .score-list { max-height: 320px; overflow-y: auto; scrollbar-width: none; }
        .score-list::-webkit-scrollbar { display: none; }
        .score-row { display: flex; justify-content: space-between; padding: 12px 6px; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.9rem; }

        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-welcome" class="screen">
        <div class="game-logo">
            <img src="couple.jpg" alt="Couple Logo" class="couple-img">
        </div>
        <h1>מי אתם יותר?</h1>
        <input type="text" id="username" placeholder="איך קוראים לכם?" autocomplete="off">
        <button class="btn-main" onclick="startQuiz()">ענו על השאלות וגלו למי אתם דומים יותר</button>
        <button class="btn-outline" onclick="goToScoreboard()">תוצאות האורחים</button>
    </div>

    <div id="screen-loading" class="screen hidden">
        <div class="spinner"></div>
        <p>מעדכן נתונים...</p>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="q-img-wrapper"><img id="q-image" src="" class="q-img"></div>
        <h2 id="q-text" style="font-size: 1.2rem; margin-bottom: 25px;"></h2>
        <div id="options">
            <button class="btn-outline" id="btn-a" onclick="submitAnswer('A')"></button>
            <button class="btn-outline" id="btn-b" onclick="submitAnswer('B')"></button>
        </div>
    </div>

    <div id="screen-result" class="screen hidden">
        <div class="match-label">גילינו שאתם...</div>
        <div class="match-percent" id="count-up">0%</div>
        <div class="match-name" id="winner-name">רותם</div>
        <p id="winner-note" style="margin-top: 20px; color: #777; font-style: italic;"></p>
        <button class="btn-main" id="save-btn" onclick="saveResult()" style="margin-top: 30px;">הוספה לתוצאות האורחים</button>
    </div>

    <div id="screen-scores" class="screen hidden">
        <h1 style="font-size: 1.8rem;">תוצאות האורחים 🏆</h1>
        <div class="score-box">
            <div class="score-col"><strong>יותר כמו רותם</strong><div id="list-rotem" class="score-list"></div></div>
            <div class="score-col"><strong>יותר כמו גל</strong><div id="list-gal" class="score-list"></div></div>
        </div>
        <button class="btn-outline" onclick="backToWelcome()" style="margin-top:20px;">חזרה</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRTCNBfrckqk4g_hzrlE33KUO1IHgf7KgWaQEZ01WoIdJONrj1wcB1IrI830GhH_yT/exec';

    const questionsDB = [
        { text: "הודעות בוואטסאפ:", a: "עונה תוך שנייה", b: "עונה אחרי יומיים", r: "A", g: "B", img: "https://images.unsplash.com/photo-1611746872915-64382b5c76da?w=400" },
        { text: "סוללה בטלפון:", a: "מטעין ב-80%", b: "חי על ה-1%", r: "B", g: "A", img: "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400" },
        { text: "אריזה לטיול:", a: "רשימות חודש מראש", b: "דוחס הכל שעה לפני", r: "A", g: "A", img: "https://images.unsplash.com/photo-1553913861-c0fddf2619ee?w=400" },
        { text: "קפה של בוקר:", a: "נס קפה זריז", b: "טקס הפולים וההקצפה", r: "A", g: "B", img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400" },
        { text: "ניווט בחו\"ל:", a: "גוגל מאפס צמוד", b: "איפה שהרגליים ייקחו", r: "A", g: "B", img: "https://images.unsplash.com/photo-1502101872923-d48509bff386?w=400" },
        { text: "במסיבה:", a: "במרכז הרחבה", b: "בצד עם דרינק", r: "B", g: "A", img: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=400" },
        { text: "סדר יום:", a: "מתקתק משימות", b: "דוחה לרגע האחרון", r: "A", g: "B", img: "https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=400" },
        { text: "צילום תמונות:", a: "קליק אחד וזהו", b: "בוק של 50 תמונות", r: "A", g: "B", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" },
        { text: "אוכל רחוב:", a: "זורם על הכל", b: "בודק ביקורות", r: "A", g: "B", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "יציאה מהבית:", a: "בודק את הגז", b: "יוצא ומתפלל", r: "B", g: "A", img: "https://images.unsplash.com/photo-1527030280862-64139fba04ca?w=400" }
    ];

    let currentQ = [], currentIndex = 0, rScore = 0, gScore = 0, name = "";
    let cachedData = JSON.parse(localStorage.getItem('wedding_scores')) || [];
    let fetchPromise = null;

    function syncData() {
        if (fetchPromise) return fetchPromise;

        fetchPromise = fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                cachedData = data.map(u => {
                    let r = parseFloat(u.rotem), g = parseFloat(u.gal);
                    if (r > 0 && r < 1) { r *= 100; g *= 100; }
                    return { name: u.name, rotem: Math.round(r) || 0, gal: Math.round(g) || 0 };
                });
                localStorage.setItem('wedding_scores', JSON.stringify(cachedData));
                if (!document.getElementById('screen-scores').classList.contains('hidden')) {
                    renderScores();
                }
                fetchPromise = null;
                return cachedData;
            })
            .catch(e => {
                console.log("Sync error");
                fetchPromise = null;
                return cachedData;
            });

        return fetchPromise;
    }

    syncData();
    setInterval(syncData, 30000);

    function startQuiz() {
        name = document.getElementById('username').value.trim();
        if(!name) return alert("הכניסו שם כדי להתחיל");
        currentIndex = 0; rScore = 0; gScore = 0;
        currentQ = [...questionsDB].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('screen-welcome').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentQ[currentIndex];
        document.getElementById('progress-fill').style.width = `${(currentIndex / 10) * 100}%`;
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('btn-a').innerText = q.a;
        document.getElementById('btn-b').innerText = q.b;
        document.getElementById('q-image').src = q.img;
    }

    function submitAnswer(choice) {
        const q = currentQ[currentIndex];
        if(choice === q.r) rScore++;
        if(choice === q.g) gScore++;
        currentIndex++;
        if(currentIndex < 10) loadQuestion();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        let rP = Math.round((rScore / (rScore + gScore)) * 100), gP = 100 - rP;
        const isRotem = rP >= gP;
        document.getElementById('winner-name').innerText = isRotem ? "רותם" : "גל";
        document.getElementById('winner-note').innerText = isRotem ? "כדאי שתתכוננו, רותם כבר מחכה לכם בבר!" : "גל לגמרי מצאה את החצי השני שלה כאן.";
        document.getElementById('save-btn').classList.remove('hidden');
        let count = 0;
        const timer = setInterval(() => {
            count++;
            document.getElementById('count-up').innerText = count + "%";
            if (count >= (isRotem ? rP : gP)) {
                clearInterval(timer);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#1B3022', '#C5A059'] });
            }
        }, 20);
    }

    function saveResult() {
        let rP = Math.round((rScore / (rScore + gScore)) * 100), gP = 100 - rP;
        document.getElementById('save-btn').classList.add('hidden');
        cachedData.push({ name, rotem: rP, gal: gP });
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, rotem: rP, gal: gP }) });
        setTimeout(goToScoreboard, 500);
    }

    async function goToScoreboard() {
        document.getElementById('screen-welcome').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        if (cachedData.length > 0) {
            document.getElementById('screen-scores').classList.remove('hidden');
            renderScores();
            syncData(); 
        } else {
            document.getElementById('screen-loading').classList.remove('hidden');
            const timeout = setTimeout(() => {
                document.getElementById('screen-loading').classList.add('hidden');
                document.getElementById('screen-scores').classList.remove('hidden');
                renderScores();
            }, 3000);
            await syncData();
            clearTimeout(timeout);
            document.getElementById('screen-loading').classList.add('hidden');
            document.getElementById('screen-scores').classList.remove('hidden');
            renderScores();
        }
    }

    function renderScores() {
        const mapItem = u => `<div class="score-row"><span>${u.name}</span><strong>${u.rotem >= 50 ? u.rotem : u.gal}%</strong></div>`;
        document.getElementById('list-rotem').innerHTML = cachedData.filter(u => u.rotem >= 50).sort((a,b)=>b.rotem-a.rotem).map(mapItem).join('');
        document.getElementById('list-gal').innerHTML = cachedData.filter(u => u.gal > 50).sort((a,b)=>b.gal-a.gal).map(mapItem).join('');
    }

    function backToWelcome() {
        document.getElementById('screen-scores').classList.add('hidden');
        document.getElementById('screen-welcome').classList.remove('hidden');
        document.getElementById('username').value = "";
    }
</script>
</body>
</html>
