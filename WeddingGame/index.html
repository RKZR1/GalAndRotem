<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>Gal&Rotem's Wedding Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #1B3022;
            --accent: #C5A059;
            --bg: #fdfbf7;
            --glass: rgba(255, 255, 255, 0.98);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#e5e1da 0.8px, transparent 0.8px);
            background-size: 40px 40px;
            color: var(--primary);
            margin: 0;
            display: flex;
            justify-content: center; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass);
            width: 92%; max-width: 420px;
            padding: 50px 30px;
            border-radius: 35px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .screen { animation: screenFadeIn 0.5s ease-out forwards; }
        @keyframes screenFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        .game-logo { margin-bottom: 20px; }
        .couple-img {
            width: 240px;
            height: 300px;
            object-fit: cover;
            border-radius: 20%;
            border: 1px solid var(--primary);
            padding: 3px;
        }

        h1 { font-weight: 700; font-size: 2.2rem; margin: 10px 0 30px; letter-spacing: -1.5px; }

        input {
            width: 100%; padding: 18px; border: 1px solid #e0e0e0;
            border-radius: 20px; margin-bottom: 20px;
            font-size: 18px; box-sizing: border-box; outline: none;
            background: #fafafa;
        }

        button {
            width: 100%; padding: 19px; border: none;
            border-radius: 20px; font-size: 18px; font-weight: 600;
            cursor: pointer; transition: 0.3s ease;
            margin-bottom: 12px; font-family: inherit;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); }

        .progress-bar { height: 4px; background: #f0f0f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }
        .q-img-wrapper { width: 100%; height: 210px; border-radius: 24px; overflow: hidden; margin-bottom: 25px; background: #eee; }
        .q-img { width: 100%; height: 100%; object-fit: cover; }

        .match-label { font-size: 1.2rem; color: #666; margin-bottom: 5px; }
        .match-name { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -2px; }
        .match-percent { font-size: 5rem; font-weight: 800; color: var(--accent); margin: 10px 0; display: block; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .score-box { display: flex; gap: 15px; margin-top: 25px; }
        .score-col { flex: 1; padding: 20px 10px; background: #f9faf9; border-radius: 24px; border: 1px solid #f0f2f0; }
        .score-list { max-height: 320px; overflow-y: auto; scrollbar-width: none; }
        .score-list::-webkit-scrollbar { display: none; }
        .score-row { display: flex; justify-content: space-between; padding: 12px 6px; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.9rem; }

        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-welcome" class="screen">
        <div class="game-logo">
            <img src="couple.jpg" alt="Couple Logo" class="couple-img">
        </div>
        <h1>מי אתם יותר?</h1>
        <input type="text" id="username" placeholder="איך קוראים לכם?" maxlength="25" autocomplete="off">
        <button class="btn-main" id="btn-start">ענו על השאלות וגלו למי אתם דומים יותר</button>
        <button class="btn-outline" id="btn-scores">תוצאות האורחים</button>
    </div>

    <div id="screen-loading" class="screen hidden">
        <div class="spinner"></div>
        <p>מעדכן נתונים...</p>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="q-img-wrapper"><img id="q-image" src="" class="q-img" alt=""></div>
        <h2 id="q-text" style="font-size: 1.2rem; margin-bottom: 25px;"></h2>
        <div id="options">
            <button class="btn-outline" id="btn-a"></button>
            <button class="btn-outline" id="btn-b"></button>
        </div>
    </div>

    <div id="screen-result" class="screen hidden">
        <div class="match-label">גילינו שאתם...</div>
        <div class="match-percent" id="count-up">0%</div>
        <div class="match-name" id="winner-name"></div>
        <p id="winner-note" style="margin-top: 20px; color: #777; font-style: italic;"></p>
        <button class="btn-main" id="save-btn" style="margin-top: 30px;">הוספה לתוצאות האורחים</button>
    </div>

    <div id="screen-scores" class="screen hidden">
        <h1 style="font-size: 1.8rem;">תוצאות האורחים 🏆</h1>
        <div class="score-box">
            <div class="score-col"><strong>יותר כמו רותם</strong><div id="list-rotem" class="score-list"></div></div>
            <div class="score-col"><strong>יותר כמו גל</strong><div id="list-gal" class="score-list"></div></div>
        </div>
        <button class="btn-outline" id="btn-back" style="margin-top:20px;">חזרה</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzRTCNBfrckqk4g_hzrlE33KUO1IHgf7KgWaQEZ01WoIdJONrj1wcB1IrI830GhH_yT/exec';

    // --- Active Defense Module (Mini-WAF) ---
    const MALICIOUS_PAYLOAD_REGEX = /(<([^>]+)>)|(javascript:)|(on\w+\s*=)|(eval\s*\()/i;

    function isMalicious(input) {
        return typeof input === 'string' && MALICIOUS_PAYLOAD_REGEX.test(input);
    }

    function bustAttacker() {
        // מחיקת עקבות זדוניות וזריקת התוקף
        localStorage.removeItem('wedding_scores');
        window.location.replace("https://galandrotem.com/busted");
    }
    // ----------------------------------------

    const questionsDB = [
        { text: "אריזה לטיול", a: "מכינים רשימות חודש מראש", b: "דוחסים הכל ערב לפני", r: "B", g: "A", img: "https://images.unsplash.com/photo-1553913861-c0fddf2619ee?w=400" },
        { text: "קפה של בוקר", a: "נס קפה זריז", b: "טקס הפולים וההקצפה", r: "B", g: "A", img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400" },
        { text: "ניווט בחו\"ל", a: "גוגל מאפס צמוד", b: "איפה שהרגליים ייקחו", r: "B", g: "A", img: "https://images.unsplash.com/photo-1502101872923-d48509bff386?w=400" },
        { text: "צילום תמונות", a: "צילום אחד וזהו", b: "בוק של 50 תמונות", r: "A", g: "B", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" },
        { text: "כשרואים נטפליקס", a: "בינג עד אמצע הלילה", b: "נרדמים אחרי 10 דקות", r: "A", g: "B", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "מתי צריך לשטוף כלים", a: "מיד בסוף האוכל", b: "חייב להשרות קצת במים (עד מחר)", r: "B", g: "A", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "שעון מעורר בבוקר", a: "קם בצילצול הראשון", b: "7 נודניקים בהפרשים של 5 דקות", r: "B", g: "A", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "במטוס", a: "נרדם כמה שיותר מהר", b: "רואה 3 סרטים ברצף ולא עוצם עין", r: "B", g: "A", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "מושב בטיסה", a: "חלון", b: "מעבר", r: "B", g: "A", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "במסעדה", a: "יודע מה להזמין עוד לפני שהתיישבנו", b: "קורא את כל התפריט 3 פעמים ומשנה דעה ברגע שהמלצר מגיע", r: "A", g: "B", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "שאריות מאתמול", a: "אוכל קר ישר מהמקרר", b: "חייב לחמם בצלחת מסודרת", r: "A", g: "B", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "בסרט בקולנוע", a: "מסיים את הפופקורן עוד לפני שנגמרו הפרסומות", b: "שומר לאמצע הסרט", r: "B", g: "A", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "מוזיקה באוטו", a: "שר בקול ומזייף בכיף", b: "מהנהן עם הראש בשקט", r: "B", g: "A", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "אוכל רחוב", a: "איפה שיש הרבה אנשים", b: "תמיד בודק ביקורות לפני", r: "A", g: "B", img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
        { text: "צק ליסט יציאה מהבית", a: "חוזרים 3 פעמים לקחת משהו ששכחנו ביציאה", b: "יוצא ומתפלל שהגז סגור", r: "B", g: "A", img: "https://images.unsplash.com/photo-1527030280862-64139fba04ca?w=400" }
    ];

    let currentQ = [], currentIndex = 0, rScore = 0, gScore = 0, name = "";
    let cachedData = [];
    let fetchPromise = null;

    function parseUserData(rawName, rawR, rawG) {
        let r = Number(rawR);
        let g = Number(rawG);
        
        if (isNaN(r) || isNaN(g)) return null;
        if (r > 0 && r < 1) { r *= 100; g *= 100; }
        
        r = Math.max(0, Math.min(100, Math.round(r)));
        g = Math.max(0, Math.min(100, Math.round(g)));
        
        return { name: String(rawName || "").trim().substring(0, 25), rotem: r, gal: g };
    }

    // בדיקת חדירה דרך LocalStorage
    try {
        const localDataString = localStorage.getItem('wedding_scores');
        if (localDataString) {
            // אם מישהו ערך את הזיכרון המקומי והזריק לשם קוד: טריגר ישיר
            if (isMalicious(localDataString)) {
                bustAttacker();
            } else {
                const parsed = JSON.parse(localDataString);
                if (Array.isArray(parsed)) {
                    cachedData = parsed.map(u => parseUserData(u.name, u.rotem, u.gal)).filter(Boolean);
                }
            }
        }
    } catch(e) { 
        cachedData = []; 
        localStorage.removeItem('wedding_scores'); 
    }

    function syncData() {
        if (fetchPromise) return fetchPromise;

        fetchPromise = fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                if (!Array.isArray(data)) throw new Error("Invalid schema");
                
                cachedData = data.map(u => {
                    // סינון שקט לנתוני שרת (כדי לא לעשות DoS לאורחים במידה והשרת נפרץ)
                    if (isMalicious(u.name)) return null;
                    return parseUserData(u.name, u.rotem, u.gal);
                }).filter(Boolean);
                
                localStorage.setItem('wedding_scores', JSON.stringify(cachedData));
                
                if (!document.getElementById('screen-scores').classList.contains('hidden')) {
                    renderScores();
                }
                fetchPromise = null;
                return cachedData;
            })
            .catch(e => {
                fetchPromise = null;
                return cachedData;
            });

        return fetchPromise;
    }

    syncData();
    setInterval(syncData, 60000);

    function startQuiz() {
        const rawName = document.getElementById('username').value.trim();
        
        if(!rawName) return alert("הכניסו שם כדי להתחיל");
        
        // --- Active Defense Trigger ---
        // אם המשתמש ניסה להזין קוד במקום שם, זורקים אותו לעמוד Busted מיד
        if (isMalicious(rawName)) {
            return bustAttacker();
        }

        name = rawName.substring(0, 25);
        currentIndex = 0; rScore = 0; gScore = 0;
        currentQ = [...questionsDB].sort(() => 0.5 - Math.random()).slice(0, 10);
        
        document.getElementById('screen-welcome').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentQ[currentIndex];
        document.getElementById('progress-fill').style.width = `${(currentIndex / 10) * 100}%`;
        
        document.getElementById('q-text').textContent = q.text;
        document.getElementById('btn-a').textContent = q.a;
        document.getElementById('btn-b').textContent = q.b;
        document.getElementById('q-image').src = q.img;
    }

    function submitAnswer(choice) {
        const q = currentQ[currentIndex];
        if(choice === q.r) rScore++;
        if(choice === q.g) gScore++;
        currentIndex++;
        if(currentIndex < 10) loadQuestion();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        
        let rP = Math.round((rScore / (rScore + gScore)) * 100), gP = 100 - rP;
        const isRotem = rP >= gP;
        
        document.getElementById('winner-name').textContent = isRotem ? "רותם" : "גל";
        document.getElementById('winner-note').textContent = isRotem ? 
            "כדאי שתתכוננו, רותם כבר מחכה לכם בבר!" : 
            "גל לגמרי מצאה את החצי השני שלה כאן.";
            
        document.getElementById('save-btn').classList.remove('hidden');
        
        let count = 0;
        const target = isRotem ? rP : gP;
        const timer = setInterval(() => {
            count++;
            document.getElementById('count-up').textContent = count + "%";
            if (count >= target) {
                clearInterval(timer);
                if(typeof confetti === 'function') {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#1B3022', '#C5A059'] });
                }
            }
        }, 20);
    }

    function saveResult() {
        let rP = Math.round((rScore / (rScore + gScore)) * 100), gP = 100 - rP;
        document.getElementById('save-btn').classList.add('hidden');
        
        const safeUser = parseUserData(name, rP, gP);
        if(safeUser) cachedData.push(safeUser);
        
        // לא נגעתי! ה-fetch המקורי נשאר כמו שהוא
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, rotem: rP, gal: gP }) });
        
        setTimeout(goToScoreboard, 500);
    }

    async function goToScoreboard() {
        document.getElementById('screen-welcome').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        
        if (cachedData.length > 0) {
            document.getElementById('screen-scores').classList.remove('hidden');
            renderScores();
            syncData(); 
        } else {
            document.getElementById('screen-loading').classList.remove('hidden');
            await syncData();
            document.getElementById('screen-loading').classList.add('hidden');
            document.getElementById('screen-scores').classList.remove('hidden');
            renderScores();
        }
    }

    function renderScores() {
        const createSafeRow = (u) => {
            const row = document.createElement('div');
            row.className = 'score-row';
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = u.name; 
            
            const scoreStrong = document.createElement('strong');
            scoreStrong.textContent = `${u.rotem >= 50 ? u.rotem : u.gal}%`;
            
            row.appendChild(nameSpan);
            row.appendChild(scoreStrong);
            return row;
        };

        const listRotem = document.getElementById('list-rotem');
        const listGal = document.getElementById('list-gal');
        
        listRotem.innerHTML = '';
        listGal.innerHTML = '';

        cachedData.filter(u => u.rotem >= 50)
            .sort((a,b)=>b.rotem-a.rotem)
            .forEach(u => listRotem.appendChild(createSafeRow(u)));

        cachedData.filter(u => u.gal > 50)
            .sort((a,b)=>b.gal-a.gal)
            .forEach(u => listGal.appendChild(createSafeRow(u)));
    }

    function backToWelcome() {
        document.getElementById('screen-scores').classList.add('hidden');
        document.getElementById('screen-welcome').classList.remove('hidden');
        document.getElementById('username').value = "";
    }

    document.getElementById('btn-start').addEventListener('click', startQuiz);
    document.getElementById('btn-scores').addEventListener('click', goToScoreboard);
    document.getElementById('btn-a').addEventListener('click', () => submitAnswer('A'));
    document.getElementById('btn-b').addEventListener('click', () => submitAnswer('B'));
    document.getElementById('save-btn').addEventListener('click', saveResult);
    document.getElementById('btn-back').addEventListener('click', backToWelcome);

</script>
</body>
</html>
